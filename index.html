<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Automated DCF Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <h1 class="title">Discounted Cash Flow Dashboard</h1>
      <p class="subtitle">Project FCFF, discount with WACC, calculate intrinsic value, and test assumption sensitivity.</p>

      <section class="panel assumptions-panel">
        <div class="controls two-col">
          <label>
            Ticker
            <input id="ticker" placeholder="AAPL / MSFT / GOOGL" />
          </label>
          <label>
            Revenue Growth Rate
            <input id="revenue_growth_rate" type="number" step="0.001" placeholder="0.08" />
          </label>
          <label>
            EBIT Margin
            <input id="ebit_margin" type="number" step="0.001" placeholder="0.18" />
          </label>
          <label>
            Depreciation Rate
            <input id="depreciation_rate" type="number" step="0.001" placeholder="0.04" />
          </label>
          <label>
            Capex % Revenue
            <input id="capex_percent" type="number" step="0.001" placeholder="0.06" />
          </label>
          <label>
            NWC % Revenue
            <input id="nwc_percent" type="number" step="0.001" placeholder="0.08" />
          </label>
          <label>
            WACC
            <input id="wacc" type="number" step="0.001" placeholder="0.10" />
          </label>
          <label>
            Terminal Growth Rate
            <input id="terminal_growth_rate" type="number" step="0.001" placeholder="0.03" />
          </label>
          <label>
            Tax Rate
            <input id="tax_rate" type="number" step="0.001" placeholder="0.23" />
          </label>
        </div>

        <div class="actions">
          <button id="run-btn">Run DCF Model</button>
        </div>
      </section>

      <div id="status" class="status">Enter a ticker and optional assumptions, then run the model.</div>

      <section id="summary" class="panel hidden"></section>
      <section id="forecast" class="panel hidden"></section>
      <section id="sensitivity" class="panel hidden"></section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
