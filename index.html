<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Company Data Fetcher</title>

  <style>
    body {
      font-family: Arial;
      background: #f6f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .output {
      margin-top: 15px;
      max-height: 360px;
      overflow: auto;
      font-size: 12px;
    }

    .error {
      color: #b42318;
      background: #fef3f2;
      border: 1px solid #fecdca;
      border-radius: 8px;
      padding: 8px;
    }

    .statement {
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .statement-title {
      margin: 0;
      font-size: 13px;
      padding: 8px 10px;
      background: #f2f4f7;
      border-bottom: 1px solid #ddd;
      text-transform: capitalize;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    th, td {
      border: 1px solid #eee;
      padding: 6px;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child {
      text-align: left;
      font-weight: 600;
      background: #fafafa;
      position: sticky;
      left: 0;
    }
  </style>
</head>

<body>
  <div class="card">
    <h3>Financial Data Fetcher</h3>

    <input id="ticker" placeholder="RELIANCE.NS / AAPL" />
    <button id="fetch-btn">Fetch Data</button>

    <div id="output" class="output"></div>
  </div>

  <script>
    const btn = document.getElementById("fetch-btn");
    const input = document.getElementById("ticker");
    const output = document.getElementById("output");

    function formatValue(value) {
      if (value === null || value === undefined) return "-";
      if (typeof value === "number") return value.toLocaleString();
      return String(value);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderStatementTable(title, statementData) {
      const rows = Object.keys(statementData || {});
      if (!rows.length) return "";

      const columnSet = new Set();
      for (const rowName of rows) {
        const row = statementData[rowName] || {};
        Object.keys(row).forEach((col) => columnSet.add(col));
      }
      const columns = Array.from(columnSet);

      const headerCells = [`<th>Metric</th>`]
        .concat(columns.map((col) => `<th>${escapeHtml(col)}</th>`))
        .join("");

      const bodyRows = rows
        .map((rowName) => {
          const row = statementData[rowName] || {};
          const dataCells = columns
            .map((col) => `<td>${escapeHtml(formatValue(row[col]))}</td>`)
            .join("");
          return `<tr><td>${escapeHtml(rowName)}</td>${dataCells}</tr>`;
        })
        .join("");

      return `
        <section class="statement">
          <h4 class="statement-title">${escapeHtml(title.replace(/_/g, " "))}</h4>
          <table>
            <thead><tr>${headerCells}</tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </section>
      `;
    }

    function renderFinancialTables(data) {
      const sections = [
        ["balance_sheet", data.balance_sheet],
        ["income_statement", data.income_statement],
        ["cash_flow_statement", data.cash_flow_statement],
      ];

      const tablesHtml = sections
        .map(([title, value]) => renderStatementTable(title, value))
        .filter(Boolean)
        .join("");

      if (!tablesHtml) {
        output.innerHTML = `<div class="error">No tabular financial data returned.</div>`;
        return;
      }

      output.innerHTML = tablesHtml;
    }

    btn.addEventListener("click", async () => {
      const query = input.value.trim();

      if (!query) {
        alert("Enter ticker");
        return;
      }

      output.textContent = "Loading...";

      try {
        const res = await fetch(
          `https://automated-dcf.onrender.com/fetch-data?query=${encodeURIComponent(query)}`
        );

        const data = await res.json();

        if (data.error) {
          output.innerHTML = `<div class="error">❌ ${data.error}</div>`;
        } else {
          renderFinancialTables(data);
        }

      } catch (err) {
        output.innerHTML = `<div class="error">❌ Cannot reach backend</div>`;
        console.error(err);
      }
    });
  </script>
</body>
</html>
