<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Company Data Fetcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="page">
    <div class="card">
      <h3 class="title">Financial Data Fetcher</h3>
      <p class="subtitle">Fetch and explore Income Statement, Balance Sheet, and Cash Flow in separate tabs.</p>

      <div class="controls">
        <input id="ticker" placeholder="Try RELIANCE.NS / AAPL / MSFT" />
        <button id="fetch-btn">Fetch Data</button>
      </div>

      <div id="query-chip" class="query-chip"></div>
      <div id="tabs" class="tabs"></div>
      <div id="output" class="output">
        <div class="empty-state">Enter a ticker and click <strong>Fetch Data</strong> to view statements.</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
