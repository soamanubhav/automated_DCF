<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Data Fetcher</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f7fb;
      }

      .card {
        width: min(90vw, 420px);
        background: #fff;
        padding: 1.5rem;
        border-radius: 0.75rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      label {
        display: block;
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
      }

      input {
        width: 100%;
        padding: 0.7rem 0.8rem;
        font-size: 1rem;
        border: 1px solid #ccd2dd;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        border: 0;
        border-radius: 0.5rem;
        background: #1f6feb;
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background: #175bc1;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <label for="company-input">Company Name / Ticker</label>
      <input
        id="company-input"
        type="text"
        placeholder="e.g., Apple or AAPL"
        aria-label="Company Name or Ticker"
      />
      <button type="button">Fetch Data</button>
    </main>
  </body>
</html>
